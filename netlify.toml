[build]
  command = "npm install"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Post view: browser keeps /p/:id URL, Netlify serves post.html
[[redirects]]
  from = "/p/:id"
  to = "/post.html"
  status = 200

# API → Netlify Functions
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/posts"
  to = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/posts/*"
  to = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/preview"
  to = "/.netlify/functions/preview"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options      = "nosniff"
    X-Frame-Options             = "DENY"
    Strict-Transport-Security   = "max-age=31536000; includeSubDomains"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy     = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"

# Post view: allow external images from markdown content
[[headers]]
  for = "/p/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src * data:; connect-src 'self'; frame-ancestors 'none';"

# Preview: same relaxed image policy as post view
[[headers]]
  for = "/api/preview"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src * data:; connect-src 'self'; frame-ancestors 'none';"
