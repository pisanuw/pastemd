<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — PasteMD</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/dashboard.html" class="logo">PasteMD</a>
    <span class="spacer"></span>
    <span class="user-email" id="user-email"></span>
    <button class="btn btn-secondary" id="logout-btn" style="font-size:.85rem; padding:.35rem .8rem;">Sign out</button>
  </header>

  <div class="container">
    <div id="auth-error" class="alert alert-error hidden">You need admin access to view this page.</div>

    <div id="admin-panel" class="hidden">
      <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem;">
        <h1 style="margin:0; font-size:1.3rem;">All posts</h1>
        <span id="post-count" style="color:var(--muted); font-size:.9rem;"></span>
      </div>

      <div class="card">
        <div id="posts-loading" class="loading"><span class="spinner"></span></div>
        <p id="posts-empty" class="hidden" style="color:var(--muted); margin:0;">No posts yet.</p>
        <table class="admin-table" id="posts-table" style="display:none;">
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Date</th>
              <th style="text-align:right;">Views</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="posts-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
