<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — PasteMD</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/dashboard.html" class="logo">PasteMD</a>
    <span class="spacer"></span>
    <span class="user-email" id="user-email"></span>
    <a href="/admin.html" class="btn btn-secondary" id="admin-link" style="display:none; font-size:.85rem; padding:.35rem .8rem;">Admin</a>
    <button class="btn btn-secondary" id="logout-btn" style="font-size:.85rem; padding:.35rem .8rem;">Sign out</button>
  </header>

  <div class="container">
    <!-- New post form -->
    <div class="card" style="margin-bottom:2rem;">
      <h2 style="margin:0 0 1.25rem; font-size:1.2rem;">New post</h2>

      <div id="post-alert" class="alert hidden"></div>

      <form id="post-form">
        <div class="form-group">
          <label for="post-title">Title</label>
          <input type="text" id="post-title" name="title" placeholder="My document title" required maxlength="200">
        </div>

        <div class="form-group">
          <div class="file-row">
            <label for="post-file" style="margin:0; cursor:pointer; color:var(--accent);">Upload .md file</label>
            <input type="file" id="post-file" accept=".md,.markdown,text/markdown,text/plain" style="display:none;">
            <span id="file-name"></span>
          </div>
          <label for="post-content">Markdown content</label>
          <textarea id="post-content" name="content" placeholder="# Hello world&#10;&#10;Write your markdown here…" required></textarea>
        </div>

        <div class="form-group">
          <label for="post-password">Password (optional)</label>
          <input type="password" id="post-password" name="password" placeholder="Leave blank for public access" autocomplete="new-password">
          <p style="margin:.35rem 0 0; font-size:.8rem; color:var(--muted);">If set, viewers must enter this password. It cannot be changed later.</p>
        </div>

        <div style="display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;">
          <button type="submit" class="btn btn-primary" id="post-btn">Publish</button>
          <button type="button" class="btn btn-secondary" id="preview-btn">Preview in new tab</button>
          <span style="font-size:.8rem; color:var(--muted);">Posts cannot be edited after publishing.</span>
        </div>
      </form>
    </div>

    <!-- Success toast with URL -->
    <div id="success-box" class="alert alert-success hidden">
      Post published! Share this URL:
      <a id="post-url-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <!-- My posts -->
    <div class="card">
      <h2 style="margin:0 0 1.25rem; font-size:1.2rem;">My posts</h2>
      <div id="posts-loading" class="loading"><span class="spinner"></span></div>
      <p id="posts-empty" class="hidden" style="color:var(--muted); margin:0;">No posts yet.</p>
      <ul class="post-list" id="post-list"></ul>
    </div>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
